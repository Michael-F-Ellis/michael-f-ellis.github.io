<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/png" href="/elephantsoup/logo.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<title>Elephant Soup</title>
  <script type="module" crossorigin src="/elephantsoup/assets/index-Epr7ba-z.js"></script>
  <link rel="stylesheet" crossorigin href="/elephantsoup/assets/index-LAjCeIRh.css">
</head>

<body>
	<div id="app">
		<header>
			<div
				style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
				<img src="/elephantsoup/logo.png" alt="Elephant Soup Logo" style="height: 200px;">
				<div style="color: #8e8e93; font-size: 12px;">
					Version 1.5.3
					<a href="https://github.com/michael-f-ellis/ElephantSoup" target="_blank"
						style="color: #8e8e93; text-decoration: underline;">Source Code</a>
				</div>
			</div>
		</header>
		<div class="container">
			<!-- Repertoire View -->
			<div id="repertoire-view">
				<button id="add-piece-btn" class="button secondary-button"
					style="height: auto; min-height: 50px; font-size: 1.2rem; margin-bottom: 20px;">
					<i class="fas fa-plus"></i> Add New Piece
				</button>
				<div id="new-piece-form" style="display: none; margin-bottom: 20px;">
					<input type="text" id="new-piece-name" placeholder="Piece Name" class="input-field">
					<input type="number" id="new-piece-measures" placeholder="Total Measures" class="input-field">
					<input type="number" id="new-piece-start-measure" placeholder="Start Measure (e.g. 1)"
						class="input-field">
					<input type="text" id="new-piece-youtube" placeholder="YouTube Video ID (Optional)"
						class="input-field">
					<button id="save-piece-btn" class="button-small">Save</button>
					<button id="cancel-piece-btn" class="button-small cancel">Cancel</button>
				</div>
				<div style="margin-bottom: 20px;">
					<button id="export-btn" class="button-text">Export Data</button>
					<button id="import-btn" class="button-text">Import Data</button>
					<input type="file" id="import-file" style="display:none">
				</div>
				<div id="piece-list" class="piece-list">
					<!-- Pieces will be injected here -->
				</div>
			</div>

			<!-- Practice View -->
			<div id="practice-view" style="display: none;">
				<div class="practice-header">
					<button id="back-to-repertoire" class="back-button"><i class="fas fa-arrow-left"></i>
						Suspend</button>
					<h2 id="current-piece-name">Piece Name</h2>
					<div id="current-segment-display" class="segment-display">Measure 1</div>
				</div>

				<div class="controls-row"
					style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
					<button id="recordButton" class="button record-button">
						<i class="fas fa-microphone"></i><span>Record</span>
					</button>
				</div>

				<button id="playButton" class="button play-button" disabled>
					<i class="fas fa-play"></i><span>Play Recording</span>
				</button>

				<button id="play-sample-btn" class="button play-sample-button" style="display: none;">
					<i class="fas fa-music"></i><span>Play Sample</span>
				</button>

				<div id="practice-youtube-container" style="display: none; width: 0; height: 0;">
					<div id="practice-youtube-player"></div>
				</div>

				<div id="status" class="status">Ready to record</div>

				<div id="readiness-controls" style="display: none; margin-top: 20px;">
					<p>How was that?</p>
					<div class="rating-buttons">
						<button class="rate-btn" data-level="0">0 (New)</button>
						<button class="rate-btn" data-level="1">1 (Hard)</button>
						<button class="rate-btn" data-level="2">2 (Okay)</button>
						<button class="rate-btn" data-level="3">3 (Ready)</button>
					</div>
				</div>

				<div id="error" class="error"></div>
			</div>

			<!-- Calibration View -->
			<div id="calibration-view" style="display: none;">
				<div class="calibration-header">
					<div class="calibration-controls">
						<button id="cal-back-btn" class="back-button"><i class="fas fa-arrow-left"></i> Back</button>
						<h2 id="cal-piece-name">Calibration</h2>
					</div>
					<div class="video-container" id="youtube-player-container">
						<div id="youtube-player"></div>
					</div>
					<div class="player-controls">
						<button id="cal-seek-prev" class="btn-ctrl"><i class="fas fa-step-backward"></i></button>
						<button id="cal-play" class="btn-ctrl"><i class="fas fa-play"></i></button>
						<button id="cal-pause" class="btn-ctrl" style="display:none"><i
								class="fas fa-pause"></i></button>
						<button id="cal-stop" class="btn-ctrl"><i class="fas fa-stop"></i></button>
						<button id="cal-seek-next" class="btn-ctrl"><i class="fas fa-step-forward"></i></button>
						<button id="cal-entry-mode" class="btn-ctrl entry-btn" title="Entry Mode">
							<i class="fas fa-keyboard"></i>
							<span>Entry</span>
						</button>
						<button id="cal-save" class="btn-ctrl save-btn"><i class="fas fa-save"></i> Save</button>
					</div>
				</div>
				<div id="dot-grid" class="dot-grid">
					<!-- Measure lines will be injected here -->
				</div>
			</div>


		</div>
		<div id="resume-modal" class="modal" style="display: none;">
			<div class="modal-content">
				<h3>Resume Session?</h3>
				<p>You have a saved session for <strong id="resume-piece-name"></strong>.</p>
				<div class="modal-actions">
					<button id="resume-btn" class="button">Resume</button>
					<button id="discard-btn" class="button secondary-button">Discard & Restart</button>
					<button id="cancel-resume-btn" class="button-text">Cancel</button>
				</div>
			</div>
		</div>

		<!-- Nudge Popup -->
		<div id="nudge-popup" class="modal" style="display: none;">
			<div class="modal-content">
				<h3>Edit Measure <span id="nudge-measure-num"></span></h3>
				<div style="margin: 20px 0;">
					<label for="nudge-slider">Nudge Timing:</label>
					<input type="range" id="nudge-slider" min="-2" max="2" step="0.01" style="width: 100%;">
					<div style="display: flex; justify-content: space-between; font-size: 0.8em; color: #aaa;">
						<span>Earlier</span>
						<span id="nudge-offset-val">0.00s</span>
						<span>Later</span>
					</div>
				</div>
				<div class="modal-actions">
					<button id="nudge-save-btn" class="button-small">Apply</button>
					<button id="nudge-delete-btn" class="button-small cancel"
						style="background: #ff453a;">Delete</button>
					<button id="nudge-cancel-btn" class="button-small cancel">Close</button>
				</div>
			</div>
		</div>

		<!-- Export Modal -->
		<div id="export-modal" class="modal" style="display: none;">
			<div class="modal-content">
				<h3>Export Repertoire</h3>
				<div style="margin: 20px 0; text-align: left;">
					<label for="export-filename">Filename:</label>
					<input type="text" id="export-filename" class="input-field" placeholder="elephant_soup_backup">

					<div style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
						<input type="checkbox" id="export-clean-checkbox" style="width: 20px; height: 20px;">
						<label for="export-clean-checkbox">Clean Export (Remove all progress and merges)</label>
					</div>
					<p style="font-size: 0.8em; color: #aaa; margin-top: 5px;">Use this for sharing pieces with others.
					</p>
				</div>
				<div class="modal-actions">
					<button id="export-confirm-btn" class="button">Export</button>
					<button id="export-cancel-btn" class="button-small cancel">Cancel</button>
				</div>
			</div>
		</div>

		<script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
